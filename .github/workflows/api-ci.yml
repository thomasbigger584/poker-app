name: 🛠️ API CI/CD

on:
  push:
    branches: [ "master" ]
    paths:
      - "server/api/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - "server/api/**"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 💻 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🐳 Build Docker Images (API & RabbitMQ)
        run: |
          docker compose build rabbitmq api
        working-directory: ./server

      - name: ⚙️ Make mvnw executable
        run: chmod +x ./mvnw
        working-directory: ./server/api

      - name: 🏗️ Test with Maven
        run: ./mvnw --no-transfer-progress clean verify -P run-tests
        working-directory: ./server/api
        env:
          POKERAPP_LOG_LEVEL: INFO
  # Ensure this is running on raspberry pi:
  #  sudo tailscale up --ssh --advertise-tags=tag:raspberrypi --hostname=raspberrypi --force-reauth
  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to master, not pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: 🌐 Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # This acts as the 'is it turned on' check.
          # The job will fail/stop here if the Pi is unreachable.
          ping: raspberrypi

      - name: 🚀 Execute Remote Deployment Script
        run: |
          ssh -o StrictHostKeyChecking=no tbigg@raspberrypi "sudo bash /home/tbigg/poker-app/server/raspberrypi/deployment.sh"