name: 🛠️ API CI

on:
  push:
    branches: [ "master" ]
    paths:
      - "server/api/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - "server/api/**"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 💻 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🐳 Build Docker Images (API & RabbitMQ)
        run: |
          docker compose build rabbitmq api
        working-directory: ./server

      - name: ⚙️ Make mvnw executable
        run: chmod +x ./mvnw
        working-directory: ./server/api

      - name: 🏗️ Build and Test with Maven
        run: ./mvnw --no-transfer-progress clean verify -P run-tests
        working-directory: ./server/api
        env:
          POKERAPP_LOG_LEVEL: INFO