name: 🚀 Server CD (Deploy)

permissions:
  contents: read
  packages: read

# Merges to master build, test, and deploy. Images are built on the native ARM64
# runner (same arch as the Pi), shipped into the Pi's Docker over Tailscale
# (docker save | ssh docker load), and the remote deploy is triggered — the Pi
# never builds. Pull requests do NOT deploy; they run server-pr.yml (build +
# test only). The changes/build steps below mirror server-pr.yml.
#
# Two triggers, ONE deploy pipeline (the Pi runs both the API and the Flutter web
# bundle, which is baked into the nginx image):
#   1. push to master under server/**         → redeploy after a backend change.
#   2. the Flutter Release workflow completing → redeploy after a *web* change.
# Without (2) a Flutter-only change publishes a new web bundle as a release asset
# but nothing rebuilds the nginx image with it, so the deployed site stays stale.
# workflow_run (rather than adding client/flutter/** to the push paths) runs us
# AFTER the new bundle is published, so the "Fetch Flutter web bundle" step picks
# up the fresh asset instead of racing the in-flight Flutter build.
on:
  push:
    branches: [ "master" ]
    paths:
      - "server/**"
      - ".github/workflows/server-master.yml"
  workflow_run:
    workflows: [ "🚀 Flutter Release" ]
    types: [ completed ]
    branches: [ "master" ]
  # Manual redeploy — e.g. to re-bake the latest published web bundle into nginx
  # and ship it to the Pi without a new commit.
  workflow_dispatch:

# Serialize deploys so a backend push and a Flutter-release-triggered run can't
# ship to the Pi at the same time. Queue rather than cancel — cancelling mid
# `docker load`/deploy could leave a half-loaded image set on the Pi.
concurrency:
  group: pi-deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Only meaningful for a server push; a workflow_run (Flutter) trigger has no
      # diff base, and by definition the backend didn't change there.
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:
              - 'server/api/**'
      - name: 🧭 Decide whether to run API tests
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"   # Flutter-only redeploy: skip backend tests.
          fi

  build-and-deploy:
    needs: changes
    # A server push or manual run always deploys; a Flutter Release only deploys
    # if it succeeded (so we never ship off a half-built / missing web bundle).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Bake the Flutter web client into the nginx image (not on the Pi). The
      # flutter-release workflow attaches the web bundle to a flutter-<ver>
      # pre-release; take the newest one that has a web asset. Authenticated to
      # the public releases API to lift the unauthenticated rate limit.
      - name: 🌐 Fetch Flutter web bundle
        working-directory: ./server/nginx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Resolving latest flutter-web pre-release asset..."
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                 "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r 'map(select(.prerelease and (.tag_name|startswith("flutter-"))))
                     | map(.assets[]? | select(.name|test("flutter-web")) | .browser_download_url)
                     | first // empty')
          if [ -z "$URL" ]; then
            echo "::error::No flutter-web asset found in any flutter-* pre-release."
            exit 1
          fi
          echo "Downloading $URL"
          rm -rf web-dist && mkdir -p web-dist
          curl -fsSL "$URL" -o web-dist/web.zip
          unzip -q -o web-dist/web.zip -d web-dist
          rm -f web-dist/web.zip
          test -f web-dist/web/index.html
          # Pre-compress text assets for nginx gzip_static (kept alongside originals).
          find web-dist/web -type f \( -name '*.js' -o -name '*.wasm' -o -name '*.json' -o -name '*.css' -o -name '*.html' -o -name '*.ttf' -o -name '*.otf' -o -name '*.svg' \) -exec gzip -9 -k -f {} +

      - name: 🐳 Build all server images
        working-directory: ./server
        run: docker compose build nginx api keycloak rabbitmq

      - name: ⚙️ Make mvnw executable
        if: needs.changes.outputs.api == 'true'
        run: chmod +x ./mvnw
        working-directory: ./server/api

      - name: 🏗️ Test with Maven
        if: needs.changes.outputs.api == 'true'
        run: ./mvnw --no-transfer-progress clean verify -P run-tests
        working-directory: ./server/api
        env:
          POKERAPP_LOG_LEVEL: INFO

      # ----- Deploy -----------------------------------------------------------
      # Pi prerequisite (one-time):
      #  sudo tailscale up --ssh --advertise-tags=tag:raspberrypi --hostname=raspberrypi --force-reauth
      - name: 🌐 Connect to Tailscale
        id: tailscale
        uses: tailscale/github-action@v4
        continue-on-error: true
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: raspberrypi

      # Stream the freshly built images straight into the Pi's Docker. `docker
      # load` auto-decompresses the gzip stream and re-points each image tag to
      # the new image; piping over SSH avoids scp/SFTP (Tailscale SSH + OpenSSH 9
      # scp pitfalls) and needs no temp file.
      - name: 🚚 Ship images to the Pi (docker load over Tailscale)
        id: ship
        if: steps.tailscale.outcome == 'success'
        continue-on-error: true
        run: |
          docker save \
            com.twb.pokerapp/api \
            com.twb.pokerapp/nginx \
            com.twb.pokerapp/keycloak \
            com.twb.pokerapp/rabbitmq \
            | gzip | ssh -o StrictHostKeyChecking=no tbigg@raspberrypi 'docker load'

      # Only runs if the image load above succeeded, so we never bring the stack
      # up against a stale/half-loaded image set. Sync the Pi's checkout to the
      # just-pushed commit FIRST so it runs the latest deployment.sh / compose
      # files / configs, then hand off (the worker re-syncs too).
      - name: 🚀 Sync repo & run deployment script
        if: steps.ship.outcome == 'success'
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no tbigg@raspberrypi "cd /home/tbigg/poker-app && git fetch origin master && git checkout -B master && git reset --hard FETCH_HEAD && git clean -fd && sudo bash server/raspberrypi/deployment.sh"
