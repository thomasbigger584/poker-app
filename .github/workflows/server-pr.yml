name: 🔁 Server CI (PR)

# Pull-request validation for the server: build every image on the native ARM64
# runner (same arch as the Pi) and run the test suite. PRs NEVER deploy — that
# happens on merge to master via server-master.yml. The build/test jobs below are
# intentionally mirrored in server-master.yml (which adds the deploy steps).
on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "server/**"
      - ".github/workflows/server-pr.yml"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/detect-api-changes
        id: detect

  build:
    needs: changes
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Bake the Flutter web client into the nginx image (not on the Pi).
      - name: 🌐 Fetch Flutter web bundle
        uses: ./.github/actions/fetch-flutter-web
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build all server images
        working-directory: ./server
        run: docker compose build nginx api keycloak rabbitmq

      - name: ⚙️ Make mvnw executable
        if: needs.changes.outputs.api == 'true'
        run: chmod +x ./mvnw
        working-directory: ./server/api

      - name: 🏗️ Test with Maven
        if: needs.changes.outputs.api == 'true'
        run: ./mvnw --no-transfer-progress clean verify -P run-tests
        working-directory: ./server/api
        env:
          POKERAPP_LOG_LEVEL: INFO
