# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/server/api"
    schedule:
      interval: "daily"
    groups:
      # 1. Testcontainers & Ecosystem
      testcontainers-suite:
        patterns:
          - "*testcontainers*"
          - "com.github.dasniko*"

      # 2. Spring Framework & Security
      spring-ecosystem:
        patterns:
          - "org.springframework*"
          - "jakarta.servlet*"

      # 3. Keycloak Infrastructure
      keycloak-suite:
        patterns:
          - "org.keycloak*"

      # 4. Code Generation
      code-gen-tools:
        patterns:
          - "org.projectlombok*"
          - "org.mapstruct*"

      # 5. Common Utilities
      common-utils:
        patterns:
          - "org.apache.commons*"
          - "commons-io*"
          - "com.google.guava*"
          - "com.antkorwin*"

      # 6. Build & Test Plugins
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins*"
          - "org.codehaus.mojo*"
          - "com.google.errorprone*"

      # 7. Testing Library Updates
      testing-libraries:
        patterns:
          - "org.assertj*"
          - "org.awaitility*"

  - package-ecosystem: "pub"
    directory: "/client/flutter"
    schedule:
      interval: "daily"
    groups:
      # 1. State Management
      riverpod:
        patterns:
          - "*riverpod*"

      # 2. Auth & Security
      auth-security:
        patterns:
          - "flutter_web_auth_2*"
          - "flutter_secure_storage*"
          - "crypto"
          - "jwt_decoder"

      # 3. Networking
      networking:
        patterns:
          - "dio"
          - "connectivity_plus"

      # 4. Platform Integration
      platform-integration:
        patterns:
          - "permission_handler"
          - "url_launcher"
          - "app_settings"
          - "android_intent_plus"

      # 5. Dev & Lint Tooling
      dev-tooling:
        patterns:
          - "flutter_lints"
          - "flutter_launcher_icons"
