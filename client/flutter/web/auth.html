<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Authentication complete</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #04140A; color: #F3F6F4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
  </style>
</head>
<body>
  <p>Authentication complete. You can close this window.</p>
  <!--
    Captures the OAuth2 redirect and hands the full callback URL back to the
    Flutter app via postMessage / localStorage. Required by flutter_web_auth_2.
  -->
  <script>
    function postAuthenticationMessage() {
      const message = { 'flutter-web-auth-2': window.location.href };
      if (window.opener) {
        window.opener.postMessage(message, window.location.origin);
        window.close();
      } else if (window.parent && window.parent !== window) {
        window.parent.postMessage(message, window.location.origin);
      } else {
        localStorage.setItem('flutter-web-auth-2', window.location.href);
        window.close();
      }
    }
    postAuthenticationMessage();
  </script>
</body>
</html>
