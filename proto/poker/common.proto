syntax = "proto3";

package poker;

option java_package = "com.twb.pokerapp.proto";
option java_multiple_files = true;
option java_outer_classname = "CommonProto";

// =====================================================================
// Shared poker-app wire contract — single source of truth for the
// Android client and the Spring backend. Generated to full protobuf-java
// on the server and protobuf-javalite on Android.
//
// Conventions:
//   * UUID            -> string
//   * char            -> string (single character)
//   * BigDecimal      -> string (exact decimal, e.g. "1234.50")
//   * LocalDateTime   -> string (ISO-8601, matches Jackson JavaTimeModule)
//   * nullable boxed  -> `optional` (explicit presence)
//   * Java enum value -> prefixed proto enum value; 0 = *_UNSPECIFIED
// =====================================================================

// ---------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------

enum GameType {
  GAME_TYPE_UNSPECIFIED = 0;
  GAME_TYPE_TEXAS_HOLDEM = 1;
  GAME_TYPE_BLACKJACK = 2;
}

enum ConnectionType {
  CONNECTION_TYPE_UNSPECIFIED = 0;
  CONNECTION_TYPE_PLAYER = 1;
  CONNECTION_TYPE_LISTENER = 2;
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_CONNECTED = 1;
  SESSION_STATE_DISCONNECTED = 2;
}

enum TransactionHistoryType {
  TRANSACTION_HISTORY_TYPE_UNSPECIFIED = 0;
  TRANSACTION_HISTORY_TYPE_DEPOSIT = 1;
  TRANSACTION_HISTORY_TYPE_WITHDRAW = 2;
  TRANSACTION_HISTORY_TYPE_BUYIN = 3;
  TRANSACTION_HISTORY_TYPE_CASHOUT = 4;
  TRANSACTION_HISTORY_TYPE_RESET = 5;
}

enum CardType {
  CARD_TYPE_UNSPECIFIED = 0;
  CARD_TYPE_PLAYER_CARD_1 = 1;
  CARD_TYPE_PLAYER_CARD_2 = 2;
  CARD_TYPE_FLOP_CARD_1 = 3;
  CARD_TYPE_FLOP_CARD_2 = 4;
  CARD_TYPE_FLOP_CARD_3 = 5;
  CARD_TYPE_TURN_CARD = 6;
  CARD_TYPE_RIVER_CARD = 7;
}

enum RankType {
  RANK_TYPE_UNSPECIFIED = 0;
  RANK_TYPE_DEUCE = 1;
  RANK_TYPE_TREY = 2;
  RANK_TYPE_FOUR = 3;
  RANK_TYPE_FIVE = 4;
  RANK_TYPE_SIX = 5;
  RANK_TYPE_SEVEN = 6;
  RANK_TYPE_EIGHT = 7;
  RANK_TYPE_NINE = 8;
  RANK_TYPE_TEN = 9;
  RANK_TYPE_JACK = 10;
  RANK_TYPE_QUEEN = 11;
  RANK_TYPE_KING = 12;
  RANK_TYPE_ACE = 13;
}

enum SuitType {
  SUIT_TYPE_UNSPECIFIED = 0;
  SUIT_TYPE_CLUBS = 1;
  SUIT_TYPE_DIAMONDS = 2;
  SUIT_TYPE_HEARTS = 3;
  SUIT_TYPE_SPADES = 4;
}

enum HandType {
  HAND_TYPE_UNSPECIFIED = 0;
  HAND_TYPE_ROYAL_FLUSH = 1;
  HAND_TYPE_STRAIGHT_FLUSH = 2;
  HAND_TYPE_FOUR_OF_A_KIND = 3;
  HAND_TYPE_FULL_HOUSE = 4;
  HAND_TYPE_FLUSH = 5;
  HAND_TYPE_STRAIGHT = 6;
  HAND_TYPE_THREE_OF_A_KIND = 7;
  HAND_TYPE_TWO_PAIR = 8;
  HAND_TYPE_PAIR = 9;
  HAND_TYPE_HIGH_CARD = 10;
  HAND_TYPE_EMPTY_HAND = 11;
}

enum BettingRoundType {
  BETTING_ROUND_TYPE_UNSPECIFIED = 0;
  BETTING_ROUND_TYPE_DEAL = 1;
  BETTING_ROUND_TYPE_FLOP = 2;
  BETTING_ROUND_TYPE_TURN = 3;
  BETTING_ROUND_TYPE_RIVER = 4;
}

enum BettingRoundState {
  BETTING_ROUND_STATE_UNSPECIFIED = 0;
  BETTING_ROUND_STATE_IN_PROGRESS = 1;
  BETTING_ROUND_STATE_FINISHED = 2;
  BETTING_ROUND_STATE_FAILED = 3;
}

enum RoundState {
  ROUND_STATE_UNSPECIFIED = 0;
  ROUND_STATE_WAITING_FOR_PLAYERS = 1;
  ROUND_STATE_INIT_DEAL = 2;
  ROUND_STATE_INIT_DEAL_BET = 3;
  ROUND_STATE_FLOP_DEAL = 4;
  ROUND_STATE_FLOP_DEAL_BET = 5;
  ROUND_STATE_TURN_DEAL = 6;
  ROUND_STATE_TURN_DEAL_BET = 7;
  ROUND_STATE_RIVER_DEAL = 8;
  ROUND_STATE_RIVER_DEAL_BET = 9;
  ROUND_STATE_EVAL = 10;
  ROUND_STATE_FINISHED = 11;
  ROUND_STATE_FAILED = 12;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_CHECK = 1;
  ACTION_TYPE_BET = 2;
  ACTION_TYPE_CALL = 3;
  ACTION_TYPE_RAISE = 4;
  ACTION_TYPE_FOLD = 5;
  ACTION_TYPE_ALL_IN = 6;
}

// ---------------------------------------------------------------------
// Core domain messages (shared by REST + WebSocket)
// ---------------------------------------------------------------------

message AppUserDTO {
  string id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  bool email_verified = 6;
  bool enabled = 7;
  string total_funds = 8; // BigDecimal
  string persona = 9;
}

message TableDTO {
  string id = 1;
  string name = 2;
  GameType game_type = 3;
  optional double speed_multiplier = 4;
  optional int32 total_rounds = 5;
  int32 min_players = 6;
  int32 max_players = 7;
  string min_buyin = 8; // BigDecimal
  string max_buyin = 9; // BigDecimal
}

message CardDTO {
  string id = 1;
  RankType rank_type = 2;
  string rank_char = 3; // char
  int32 rank_value = 4;
  SuitType suit_type = 5;
  string suit_char = 6; // char
  CardType card_type = 7;
}

message HandDTO {
  string id = 1;
  HandType hand_type = 2;
  string hand_type_str = 3;
  repeated CardDTO cards = 4;
}

message PlayerSessionDTO {
  string id = 1;
  AppUserDTO user = 2;
  TableDTO poker_table = 3;
  optional int32 position = 4;
  optional bool dealer = 5;
  string funds = 6; // BigDecimal
  SessionState session_state = 7;
  ConnectionType connection_type = 8;
}

message RoundDTO {
  string id = 1;
  RoundState round_state = 2;
}

message BettingRoundDTO {
  string id = 1;
  BettingRoundType type = 2;
  BettingRoundState state = 3;
  repeated BettingRoundRefundDTO betting_round_refunds = 4;
}

message BettingRoundRefundDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  string amount = 3; // BigDecimal
}

message RoundPotDTO {
  string id = 1;
  string pot_amount = 2; // BigDecimal
  optional int32 pot_index = 3;
  repeated PlayerSessionDTO eligible_players = 4;
}

message PlayerActionDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  BettingRoundDTO betting_round = 3;
  ActionType action_type = 4;
  string amount = 5; // BigDecimal
}

message RoundWinnerDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  RoundDTO round = 3;
  HandDTO hand = 4;
  string amount = 5; // BigDecimal
}

message TransactionHistoryDTO {
  string id = 1;
  string amount = 2; // BigDecimal
  TransactionHistoryType type = 3;
  string created_date_time = 4; // LocalDateTime, ISO-8601
}

// ---------------------------------------------------------------------
// Validation (shared by REST error responses + WS VALIDATION message)
// ---------------------------------------------------------------------

message ValidationFieldDTO {
  string field = 1;
  string message = 2;
}

message ValidationDTO {
  repeated ValidationFieldDTO fields = 1;
}

// ---------------------------------------------------------------------
// REST requests / responses
//
// These are domain messages exchanged over REST. The only REST-specific
// shapes are the *ListResponse wrappers (Spring's protobuf converter needs
// a single Message body, not a bare repeated field) and ApiErrorDTO.
// ---------------------------------------------------------------------

// POST /api/poker-table
message CreateTableDTO {
  string name = 1;
  GameType game_type = 2;
  optional double speed_multiplier = 3;
  optional int32 total_rounds = 4;
  int32 min_players = 5;
  int32 max_players = 6;
  string min_buyin = 7; // BigDecimal
  string max_buyin = 8; // BigDecimal
}

// POST /api/app-user/deposit, POST /api/app-user/withdraw
message UserAmountDTO {
  string amount = 1; // BigDecimal
}

// GET /api/poker-table (element of AvailableTableListResponse)
message AvailableTableDTO {
  TableDTO table = 1;
  int32 players_connected = 2;
  bool current_user_connected = 3;
  optional ConnectionType current_user_connection_type = 4;
  optional int64 reconnect_millis_remaining = 5;
}

// GET /api/poker-table
message AvailableTableListResponse {
  repeated AvailableTableDTO tables = 1;
}

// GET /api/app-user/bots
message AppUserListResponse {
  repeated AppUserDTO users = 1;
}

// GET /api/transaction-history/current
message TransactionHistoryListResponse {
  repeated TransactionHistoryDTO transactions = 1;
}

// Body for non-validation error responses (404, 500, ...).
message ApiErrorDTO {
  int32 status = 1;
  string message = 2;
}
