syntax = "proto3";

package poker;

option java_package = "com.twb.pokerapp.proto";
option java_multiple_files = true;
option java_outer_classname = "EnumsProto";

// =====================================================================
// Shared enums — single source of truth for the Android client and the
// Spring backend. Each Java enum value maps to a prefixed proto enum
// value; 0 is always *_UNSPECIFIED (the proto3 default).
// =====================================================================

enum GameType {
  GAME_TYPE_UNSPECIFIED = 0;
  GAME_TYPE_TEXAS_HOLDEM = 1;
  GAME_TYPE_BLACKJACK = 2;
}

enum ConnectionType {
  CONNECTION_TYPE_UNSPECIFIED = 0;
  CONNECTION_TYPE_PLAYER = 1;
  CONNECTION_TYPE_LISTENER = 2;
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_CONNECTED = 1;
  SESSION_STATE_DISCONNECTED = 2;
}

enum TransactionHistoryType {
  TRANSACTION_HISTORY_TYPE_UNSPECIFIED = 0;
  TRANSACTION_HISTORY_TYPE_DEPOSIT = 1;
  TRANSACTION_HISTORY_TYPE_WITHDRAW = 2;
  TRANSACTION_HISTORY_TYPE_BUYIN = 3;
  TRANSACTION_HISTORY_TYPE_CASHOUT = 4;
  TRANSACTION_HISTORY_TYPE_RESET = 5;
}

enum CardType {
  CARD_TYPE_UNSPECIFIED = 0;
  CARD_TYPE_PLAYER_CARD_1 = 1;
  CARD_TYPE_PLAYER_CARD_2 = 2;
  CARD_TYPE_FLOP_CARD_1 = 3;
  CARD_TYPE_FLOP_CARD_2 = 4;
  CARD_TYPE_FLOP_CARD_3 = 5;
  CARD_TYPE_TURN_CARD = 6;
  CARD_TYPE_RIVER_CARD = 7;
}

enum RankType {
  RANK_TYPE_UNSPECIFIED = 0;
  RANK_TYPE_DEUCE = 1;
  RANK_TYPE_TREY = 2;
  RANK_TYPE_FOUR = 3;
  RANK_TYPE_FIVE = 4;
  RANK_TYPE_SIX = 5;
  RANK_TYPE_SEVEN = 6;
  RANK_TYPE_EIGHT = 7;
  RANK_TYPE_NINE = 8;
  RANK_TYPE_TEN = 9;
  RANK_TYPE_JACK = 10;
  RANK_TYPE_QUEEN = 11;
  RANK_TYPE_KING = 12;
  RANK_TYPE_ACE = 13;
}

enum SuitType {
  SUIT_TYPE_UNSPECIFIED = 0;
  SUIT_TYPE_CLUBS = 1;
  SUIT_TYPE_DIAMONDS = 2;
  SUIT_TYPE_HEARTS = 3;
  SUIT_TYPE_SPADES = 4;
}

enum HandType {
  HAND_TYPE_UNSPECIFIED = 0;
  HAND_TYPE_ROYAL_FLUSH = 1;
  HAND_TYPE_STRAIGHT_FLUSH = 2;
  HAND_TYPE_FOUR_OF_A_KIND = 3;
  HAND_TYPE_FULL_HOUSE = 4;
  HAND_TYPE_FLUSH = 5;
  HAND_TYPE_STRAIGHT = 6;
  HAND_TYPE_THREE_OF_A_KIND = 7;
  HAND_TYPE_TWO_PAIR = 8;
  HAND_TYPE_PAIR = 9;
  HAND_TYPE_HIGH_CARD = 10;
  HAND_TYPE_EMPTY_HAND = 11;
}

enum BettingRoundType {
  BETTING_ROUND_TYPE_UNSPECIFIED = 0;
  BETTING_ROUND_TYPE_DEAL = 1;
  BETTING_ROUND_TYPE_FLOP = 2;
  BETTING_ROUND_TYPE_TURN = 3;
  BETTING_ROUND_TYPE_RIVER = 4;
}

enum BettingRoundState {
  BETTING_ROUND_STATE_UNSPECIFIED = 0;
  BETTING_ROUND_STATE_IN_PROGRESS = 1;
  BETTING_ROUND_STATE_FINISHED = 2;
  BETTING_ROUND_STATE_FAILED = 3;
}

enum RoundState {
  ROUND_STATE_UNSPECIFIED = 0;
  ROUND_STATE_WAITING_FOR_PLAYERS = 1;
  ROUND_STATE_INIT_DEAL = 2;
  ROUND_STATE_INIT_DEAL_BET = 3;
  ROUND_STATE_FLOP_DEAL = 4;
  ROUND_STATE_FLOP_DEAL_BET = 5;
  ROUND_STATE_TURN_DEAL = 6;
  ROUND_STATE_TURN_DEAL_BET = 7;
  ROUND_STATE_RIVER_DEAL = 8;
  ROUND_STATE_RIVER_DEAL_BET = 9;
  ROUND_STATE_EVAL = 10;
  ROUND_STATE_FINISHED = 11;
  ROUND_STATE_FAILED = 12;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_CHECK = 1;
  ACTION_TYPE_BET = 2;
  ACTION_TYPE_CALL = 3;
  ACTION_TYPE_RAISE = 4;
  ACTION_TYPE_FOLD = 5;
  ACTION_TYPE_ALL_IN = 6;
}
