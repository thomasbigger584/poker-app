syntax = "proto3";

package poker;

import "poker/enums.proto";

option java_package = "com.twb.pokerapp.proto";
option java_multiple_files = true;
option java_outer_classname = "DomainProto";

// =====================================================================
// Core domain messages — shared by both the REST API and the WebSocket
// protocol, and the building blocks the other contract files compose.
//
// Scalar conventions on the wire:
//   * UUID            -> string
//   * char            -> string (single character)
//   * BigDecimal      -> string (exact decimal, e.g. "1234.50")
//   * LocalDateTime   -> string (ISO-8601, matches Jackson JavaTimeModule)
//   * nullable boxed  -> `optional` (explicit presence)
// =====================================================================

message AppUserDTO {
  string id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  bool email_verified = 6;
  bool enabled = 7;
  string total_funds = 8; // BigDecimal
  string persona = 9;
}

message TableDTO {
  string id = 1;
  string name = 2;
  GameType game_type = 3;
  optional double speed_multiplier = 4;
  optional int32 total_rounds = 5;
  int32 min_players = 6;
  int32 max_players = 7;
  string min_buyin = 8; // BigDecimal
  string max_buyin = 9; // BigDecimal
}

message CardDTO {
  string id = 1;
  RankType rank_type = 2;
  string rank_char = 3; // char
  int32 rank_value = 4;
  SuitType suit_type = 5;
  string suit_char = 6; // char
  CardType card_type = 7;
}

message HandDTO {
  string id = 1;
  HandType hand_type = 2;
  string hand_type_str = 3;
  repeated CardDTO cards = 4;
}

message PlayerSessionDTO {
  string id = 1;
  AppUserDTO user = 2;
  TableDTO poker_table = 3;
  optional int32 position = 4;
  optional bool dealer = 5;
  string funds = 6; // BigDecimal
  SessionState session_state = 7;
  ConnectionType connection_type = 8;
}

message RoundDTO {
  string id = 1;
  RoundState round_state = 2;
}

message BettingRoundDTO {
  string id = 1;
  BettingRoundType type = 2;
  BettingRoundState state = 3;
  repeated BettingRoundRefundDTO betting_round_refunds = 4;
}

message BettingRoundRefundDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  string amount = 3; // BigDecimal
}

message RoundPotDTO {
  string id = 1;
  string pot_amount = 2; // BigDecimal
  optional int32 pot_index = 3;
  repeated PlayerSessionDTO eligible_players = 4;
}

message PlayerActionDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  BettingRoundDTO betting_round = 3;
  ActionType action_type = 4;
  string amount = 5; // BigDecimal
}

message RoundWinnerDTO {
  string id = 1;
  PlayerSessionDTO player_session = 2;
  RoundDTO round = 3;
  HandDTO hand = 4;
  string amount = 5; // BigDecimal
}

message TransactionHistoryDTO {
  string id = 1;
  string amount = 2; // BigDecimal
  TransactionHistoryType type = 3;
  string created_date_time = 4; // LocalDateTime, ISO-8601
}
