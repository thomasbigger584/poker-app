name: 'nginx'
services:
  nginx-base:
    image: nginx:alpine
    container_name: nginx
    env_file:
      - ../env/.secrets.env
    volumes:
      - ./conf.d/proxy_params.conf:/etc/nginx/conf.d/proxy_params.conf:ro
      - ./conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./html:/usr/share/nginx/html
      - tailscale_certs:/etc/nginx/certs:ro
    command: >
      /bin/sh -c "envsubst '\$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf &&
      sed -i 's|__DOMAIN_PLACEHOLDER__|\$$DOMAIN|g' /usr/share/nginx/html/index.html &&
      while true; do sleep 12h; nginx -s reload; done & nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
