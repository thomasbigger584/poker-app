# Define Upstreams for better management and connection pooling
upstream keycloak_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream keycloak_mgmt_backend {
    server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream rabbitmq_backend {
    server 127.0.0.1:15672 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream pgadmin_backend {
    server 127.0.0.1:5050 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream api_backend {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name poker-app.taila8b6c7.ts.net;

    # HTTP to HTTPS Redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name poker-app.taila8b6c7.ts.net;

    ssl_certificate     /etc/nginx/certs/poker.crt;
    ssl_certificate_key /etc/nginx/certs/poker.key;

    # 2026 Best Practice: HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Keycloak Main Service
    location /auth/ {
        proxy_pass http://keycloak_backend/auth/;
        proxy_set_header X-Forwarded-Prefix /auth;
        include conf.d/proxy_params.conf;
    }

    # Keycloak Management/Health Interface
    location /keycloak/ {
        proxy_pass http://keycloak_mgmt_backend/;
        proxy_set_header X-Forwarded-Prefix /keycloak;
        include conf.d/proxy_params.conf;
    }

    # RabbitMQ Management UI
    location /rabbitmq/ {
        proxy_pass http://rabbitmq_backend/;
        proxy_set_header X-Forwarded-Prefix /rabbitmq;
        include conf.d/proxy_params.conf;
    }

    # pgAdmin UI
    location /pgadmin/ {
        proxy_pass http://pgadmin_backend;
        proxy_set_header X-Script-Name /pgadmin;
        include conf.d/proxy_params.conf;
    }

    # Spring Boot API Backend
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header X-Forwarded-Prefix /api;
        include conf.d/proxy_params.conf;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
