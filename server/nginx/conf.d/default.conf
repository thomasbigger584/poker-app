# Define Upstreams for better management and connection pooling
upstream keycloak_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream keycloak_mgmt_backend {
    server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream rabbitmq_backend {
    server 127.0.0.1:15672 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream pgadmin_backend {
    server 127.0.0.1:5050 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream api_backend {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name poker-app.dinosaur-emperor.ts.net;

    # HTTP to HTTPS Redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name poker-app.dinosaur-emperor.ts.net;

    ssl_certificate     /etc/nginx/certs/poker.crt;
    ssl_certificate_key /etc/nginx/certs/poker.key;

    # 2026 Best Practice: HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression — prefer the .gz files pre-built into the image (gzip_static),
    # fall back to compressing on the fly for everything else.
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/wasm image/svg+xml
        font/ttf font/otf application/manifest+json;

    # The Flutter web client is served from the site root, so its asset-caching
    # rules below are bare-extension regexes (e.g. `\.css$`). Those would
    # otherwise shadow proxied backend paths that end in the same extensions
    # (Keycloak alone serves plenty of .css/.js/.woff2 under /auth/). The `^~`
    # modifier makes each proxied prefix win outright when it's the longest
    # match, so nginx skips the regexes for these backends. Keep the `^~`.

    # Keycloak Main Service
    location ^~ /auth/ {
        proxy_pass http://keycloak_backend/auth/;
        proxy_set_header X-Forwarded-Prefix /auth;
        include conf.d/proxy_params.conf;
    }

    # Keycloak Management/Health Interface
    location ^~ /keycloak/ {
        proxy_pass http://keycloak_mgmt_backend/;
        proxy_set_header X-Forwarded-Prefix /keycloak;
        include conf.d/proxy_params.conf;
    }

    # RabbitMQ Management UI
    location ^~ /rabbitmq/ {
        proxy_pass http://rabbitmq_backend/;
        proxy_set_header X-Forwarded-Prefix /rabbitmq;
        include conf.d/proxy_params.conf;
    }

    # pgAdmin UI
    location ^~ /pgadmin/ {
        proxy_pass http://pgadmin_backend;
        proxy_set_header X-Script-Name /pgadmin;
        include conf.d/proxy_params.conf;
    }

    # Spring Boot API Backend
    location ^~ /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header X-Forwarded-Prefix /api;
        include conf.d/proxy_params.conf;
    }

    # ---- Flutter web client (production build, served at the site root) ----
    # The bundle is built with a generic base href ("/") by the flutter-release
    # workflow and downloaded prebuilt by the Pi deploy script — see the
    # Dockerfile. It serves as a single-page app from /usr/share/nginx/html.

    # Entry points + service worker must always revalidate so a redeploy is
    # picked up immediately. `expires` (not add_header) so the security headers
    # above are still inherited.
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|manifest\.json)$ {
        root /usr/share/nginx/html;
        expires epoch;            # Cache-Control: no-cache
    }

    # Hashed/immutable build assets (Flutter output + /branding) — cache hard;
    # the service worker handles content revalidation on update. This regex is
    # only reached for the static site: the proxied backends above are `^~`.
    location ~* \.(?:js|wasm|css|png|jpe?g|gif|svg|ico|ttf|otf|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        access_log off;
    }

    # SPA fallback for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
