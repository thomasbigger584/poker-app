# Allow 'guest' to connect from remote hosts (e.g., your API container)
loopback_users.guest = false

# Ensure the management UI and logs are visible
log.console = true
management.tcp.port = 15672

# Load all users, vhosts, and permissions from this file
# Note: Users defined here will override default 'guest' settings
load_definitions = /etc/rabbitmq/definitions.json