name: 'api'
services:
  api-base:
    container_name: api
    image: com.twb.pokerapp/api
    build:
      # Repo root so the shared proto/ contract (sibling to server/) is inside the build context.
      context: ../..
      dockerfile: server/api/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
